services:
  postgres:
    image: postgres:18.3-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    tmpfs:
      - /run
      - /var/run
      - /tmp
    env_file:
      - settings/.env.local
    environment:
      - POSTGRES_INITDB_ARGS=--nosync
    command: >
      postgres
        -c fsync=off
        -c synchronous_commit=off
        -c full_page_writes=off
        -c log_statement=none
        -c logging_collector=off
        -c log_min_duration_statement=-1
        -c log_min_error_statement=panic
    logging:
      driver: none

  postgres-test:
    image: postgres:18.3-alpine
    ports:
      - "5431:5432"
    env_file:
      - settings/.env.test
    environment:
      - POSTGRES_INITDB_ARGS=--nosync
  kafka-1:
    image: apache/kafka:4.0.0
    container_name: kafka-1
    mem_limit: 1024m
    environment: &kafka-env
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-1:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 5368709120
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
    ports:
      - "9092:9092"
    volumes:
      - kafka1_data:/var/lib/kafka/data

  kafka-2:
    image: apache/kafka:4.0.0
    container_name: kafka-2
    mem_limit: 1024m
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 2
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-2:9092'
    ports:
      - "9093:9092"
    volumes:
      - kafka2_data:/var/lib/kafka/data

  kafka-3:
    image: apache/kafka:4.0.0
    container_name: kafka-3
    mem_limit: 1024m
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 3
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-3:9092'
    ports:
      - "9094:9092"
    volumes:
      - kafka3_data:/var/lib/kafka/data

  init-kafka:
    image: apache/kafka:4.0.0
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    command: >
      /bin/sh -c "
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:9092 --create --if-not-exists --topic test-topic --partitions 3 --replication-factor 3;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:9092 --create --if-not-exists --topic test-topic-dlq --partitions 1 --replication-factor 3
      "

  producer:
    image: apache/kafka:4.0.0
    container_name: producer
    stdin_open: true
    tty: true
    depends_on:
      init-kafka:
        condition: service_completed_successfully
    command: >
      /opt/kafka/bin/kafka-console-producer.sh 
      --bootstrap-server kafka-1:9092,kafka-2:9092,kafka-3:9092 
      --topic test-topic 
      --producer-property acks=all

  consumer-1: &consumer
    image: apache/kafka:4.0.0
    depends_on:
      init-kafka:
        condition: service_completed_successfully
    command: /opt/kafka/bin/kafka-console-consumer.sh --bootstrap-server kafka-1:9092,kafka-2:9092,kafka-3:9092 --topic test-topic --group my-group

  consumer-2:
    <<: *consumer

  consumer-3:
    <<: *consumer

  dlq-monitor:
    image: apache/kafka:4.0.0
    depends_on:
      init-kafka:
        condition: service_completed_successfully
    command: /opt/kafka/bin/kafka-console-consumer.sh --bootstrap-server kafka-1:9092,kafka-2:9092,kafka-3:9092 --topic test-topic-dlq --from-beginning

volumes:
  postgres_data:
  kafka1_data:
  kafka2_data:
  kafka3_data:
